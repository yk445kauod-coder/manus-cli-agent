<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manus Web Agent</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #238636;
            --terminal-header: #161b22;
            --prompt-color: #58a6ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        #terminal {
            flex: 1;
            background-color: var(--bg-color);
            border: 1px solid #30363d;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #terminal-header {
            background-color: var(--terminal-header);
            padding: 10px 15px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #output {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .message {
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .user-msg {
            color: var(--prompt-color);
            font-weight: bold;
        }

        .ai-msg {
            color: var(--text-color);
        }

        .status-msg {
            color: #8b949e;
            font-style: italic;
            font-size: 0.9em;
        }

        #input-area {
            padding: 15px;
            background-color: var(--terminal-header);
            border-top: 1px solid #30363d;
            display: flex;
            align-items: center;
        }

        #prompt {
            color: var(--prompt-color);
            margin-right: 10px;
            font-weight: bold;
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-family: inherit;
            font-size: 1em;
            outline: none;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background-color: var(--accent-color);
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Markdown Styling */
        .ai-msg h1, .ai-msg h2, .ai-msg h3 { color: var(--prompt-color); }
        .ai-msg code { background: #161b22; padding: 2px 4px; border-radius: 3px; }
        .ai-msg pre { background: #161b22; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <div id="terminal">
        <div id="terminal-header">
            <span><i class="fas fa-terminal"></i> Manus Web Agent - Developed by Yousef Khamis</span>
            <div style="display: flex; gap: 8px;">
                <div style="width: 12px; height: 12px; border-radius: 50%; background: #ff5f56;"></div>
                <div style="width: 12px; height: 12px; border-radius: 50%; background: #ffbd2e;"></div>
                <div style="width: 12px; height: 12px; border-radius: 50%; background: #27c93f;"></div>
            </div>
        </div>
        <div id="output">
            <div class="message ai-msg">Welcome to Manus Web Agent. How can I help you today?</div>
        </div>
        <div id="input-area">
            <span id="prompt">manus-web ></span>
            <input type="text" id="user-input" autofocus autocomplete="off">
            <span class="cursor"></span>
        </div>
    </div>

    <script>
        const socket = io();
        const output = document.getElementById('output');
        const userInput = document.getElementById('user-input');

        function appendMessage(content, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            if (type === 'ai-msg') {
                div.innerHTML = marked.parse(content);
            } else {
                div.textContent = content;
            }
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const message = userInput.value.trim();
                if (message) {
                    appendMessage(`manus-web > ${message}`, 'user-msg');
                    socket.emit('user_input', { message: message });
                    userInput.value = '';
                }
            }
        });

        socket.on('status', (data) => {
            const statusDiv = document.createElement('div');
            statusDiv.className = 'message status-msg';
            statusDiv.textContent = `[${data.message}]`;
            output.appendChild(statusDiv);
            output.scrollTop = output.scrollHeight;
        });

        socket.on('response', (data) => {
            appendMessage(data.content, 'ai-msg');
        });

        socket.on('error', (data) => {
            appendMessage(`Error: ${data.message}`, 'status-msg');
        });
    </script>
</body>
</html>
